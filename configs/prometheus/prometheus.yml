global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "jobmgr"
    static_configs:
      - targets: ["jobmgr:1041"]

  - job_name: "fastapi"
    metrics_path: /metrics
    static_configs:
      - targets: ["old_sync:8001"]
        labels:
          pipeline: "old_sync"

      - targets: ["new_sync:8002"]
        labels:
          pipeline: "new_sync"

      - targets: ["new_async:8003"]
        labels:
          pipeline: "new_async"

  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
