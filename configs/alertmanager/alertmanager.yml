# Gmail로 알람 이메일 발송 (killfog1@gmail.com)
# 비밀번호: 아래 YOUR_GMAIL_APP_PASSWORD 를 Gmail 앱 비밀번호로 교체하세요.
# Gmail 2단계 인증 사용 후 "앱 비밀번호" 생성: https://myaccount.google.com/apppasswords
global:
  smtp_smarthost: "smtp.gmail.com:587"
  smtp_from: "killfog1@gmail.com"
  smtp_auth_username: "killfog1@gmail.com"
  smtp_auth_password: "YOUR_GMAIL_APP_PASSWORD"
  smtp_require_tls: true

# 이메일 비활성화 시 receiver를 "noop"으로 두고, Gmail 발송 시 "email-killfog1"로 변경
route:
  receiver: "noop"
  group_by: ["alertname", "pipeline"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: "noop"
    # 이메일 없음 — 알람은 Alertmanager UI(9093)에서만 확인

  - name: "email-killfog1"
    email_configs:
      - to: "killfog1@gmail.com"
        send_resolved: true
        headers:
          Subject: "[Prometheus] {{ .Status | toUpper }}: {{ .GroupLabels.alertname }}"
