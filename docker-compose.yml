services:
  retrieval-service:
    build:
      context: .
      dockerfile: Dockerfile.retrieval-service
    container_name: tasteam-retrieval-service
    ports:
      - "8010:8010"
    env_file:
      - .env
    environment:
      PORT: "8010"
      HF_HOME: /app/models
      EMBEDDING_CACHE_DIR: /app/models
      QDRANT_URL: /app/qdrant_data
      USE_RETRIEVAL_SERVICE: "false"
    volumes:
      - model-cache:/app/models
      - qdrant-data:/app/qdrant_data
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: dockerfile
    container_name: tasteam-app
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      PORT: "8001"
      USE_RETRIEVAL_SERVICE: "true"
      RETRIEVAL_SERVICE_URL: "http://retrieval-service:8010"
      # HuggingFace/Transformers cache (persist to avoid re-download on restart)
      HF_HOME: /app/models
      # FastEmbed cache path (VectorSearch sets FASTEMBED_CACHE_PATH from this)
      EMBEDDING_CACHE_DIR: /app/models
      # Qdrant local path (default in config is "./qdrant_data")
      QDRANT_URL: /app/qdrant_data
    volumes:
      - model-cache:/app/models
      - qdrant-data:/app/qdrant_data
    depends_on:
      - retrieval-service
    restart: unless-stopped

volumes:
  model-cache: {}
  qdrant-data: {}
