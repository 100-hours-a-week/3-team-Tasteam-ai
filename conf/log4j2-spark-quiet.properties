# Spark 로그 억제 (Log4j 2, Spark conf/log4j2.properties.template 구조 준수)
# - rootLogger WARN
# - org.apache.spark: OFF (TaskSetManager/BlockManager/Executor 등 JVM 스택 제거)
# - Hadoop NativeCodeLoader: ERROR

rootLogger.level = warn
rootLogger.appenderRef.stdout.ref = console

appender.console.type = Console
appender.console.name = console
appender.console.target = SYSTEM_ERR
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yy/MM/dd HH:mm:ss} %p %c{1}: %m%n%ex

# Spark 내부 로그 제거 (PYTHON_VERSION_MISMATCH 등 JVM 스택 트레이스)
logger.spark.name = org.apache.spark
logger.spark.level = off

# Hadoop NativeCodeLoader WARN 제거
logger.nativecode.name = org.apache.hadoop.util.NativeCodeLoader
logger.nativecode.level = error
