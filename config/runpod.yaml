# RunPod 설정 (API 키·S3 시크릿은 환경 변수만 사용, 이 파일에 넣지 말 것)
# 환경 변수로 오버라이드 가능: RUNPOD_NETWORK_VOLUME_ID_TRAIN, RUNPOD_POD_IMAGE_NAME_TRAIN 등

# S3 호환 API (네트워크 볼륨 접근)
s3:
  region: "eu-ro-1"
  endpoint_url: "https://s3api-eu-ro-1.runpod.io"
  # 기본 볼륨 ID (train용). RUNPOD_NETWORK_VOLUME_ID 또는 RUNPOD_NETWORK_VOLUME_ID_TRAIN으로 오버라이드
  volume_id: "qzd1kj7t7t"

# 용도별 네트워크 볼륨 ID
volumes:
  train: "od0ndkn43b"
  labeling: "o3a3ya7flt"
  eval: "qzd1kj7t7t"

# Pod 기본값 (get_default_pod_payload)
pod:
  train:
    image_name: "jinsoo1218/train-llm:latest"
    network_volume_id: "od0ndkn43b"
  labeling:
    image_name: "jinsoo1218/runpod-pod-vllm:latest"
    network_volume_id: "o3a3ya7flt"
  eval:
    image_name: "jinsoo1218/train-llm:latest"
    network_volume_id: "qzd1kj7t7t"
  # 공통 payload 옵션
  gpu_type_ids:
    - "NVIDIA GeForce RTX 4090"
    - "NVIDIA RTX A5000"
  data_center_ids:
    - "EU-RO-1"
    - "CA-MTL-1"
    - "EU-SE-1"
    - "US-IL-1"
    - "EUR-IS-1"
    - "EU-CZ-1"
    - "US-TX-3"
    - "EUR-IS-2"
    - "US-KS-2"
    - "US-GA-2"
    - "US-WA-1"
    - "US-TX-1"
    - "CA-MTL-3"
    - "EU-NL-1"
    - "US-TX-4"
    - "US-CA-2"
    - "US-NC-1"
    - "OC-AU-1"
    - "US-DE-1"
    - "EUR-IS-3"
    - "CA-MTL-2"
    - "AP-JP-1"
    - "EUR-NO-1"
    - "EU-FR-1"
    - "US-KS-3"
    - "US-GA-1"
  allowed_cuda_versions:
    - "13.0"
  container_disk_in_gb: 50
  gpu_count: 1
  vcpu_count: 2

# REST API (Pod 생성/삭제 등)
api:
  base_url: "https://rest.runpod.io/v1"
  timeout: 120
