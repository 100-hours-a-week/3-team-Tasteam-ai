# wandb Sweep 설정: QLoRA SFT 하이퍼파라미터 탐색
# 사용: wandb sweep scripts/wandb_sweep_qlora.yaml
# 실행: WANDB_SWEEP_LABELED_PATH=... WANDB_SWEEP_OUTPUT_DIR=... wandb agent <sweep_id>
# 환경변수(필수): WANDB_SWEEP_LABELED_PATH, WANDB_SWEEP_OUTPUT_DIR, WANDB_API_KEY, WANDB_PROJECT

program: scripts/run_qlora_sweep.py
method: bayes   # bayes | random | grid
metric:
  name: train/loss
  goal: minimize

parameters:
  # 탐색 대상
  learning_rate:
    distribution: log_uniform_values
    min: 1.0e-5
    max: 5.0e-5
  num_epochs:
    values: [1, 2, 3]
  batch_size:
    values: [2, 4]
  r:
    values: [4, 8, 16]
  alpha:
    values: [8, 16, 32]
  max_seq_length:
    values: [1024, 2048]

  # 고정값 (sweep에서 변경하지 않음)
  student_model:
    value: "Qwen/Qwen2.5-0.5B-Instruct"
  gold_oversample_ratio:
    value: 0.25
  target_modules:
    value: "q_proj,v_proj,k_proj,o_proj,gate_proj,up_proj,down_proj"
  grad_accum:
    value: 4
